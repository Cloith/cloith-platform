---
- name: "Install Hardened K3s on Tailnet"
  hosts: my_server
  become: yes
  tasks:
    - name: "Get Tailscale IPv4"
      shell: "tailscale ip -4"
      register: tailscale_ip_raw
      changed_when: false

    - name: "Set TS_IP variable"
      set_fact:
        ts_ip: "{{ tailscale_ip_raw.stdout | trim }}"

    - name: "Install K3s with Tailscale & NGF Readiness"
      shell: |
        curl -sfL https://get.k3s.io | sh -s - server \
        --node-ip={{ ts_ip }} \
        --node-external-ip={{ ts_ip }} \
        --flannel-iface=tailscale0 \
        --disable=traefik \
        --write-kubeconfig-mode=644
      args:
        creates: /usr/local/bin/k3s

    - name: "Wait for Node to be Ready"
      shell: "k3s kubectl get nodes"
      register: nodes_ready
      until: "' Ready ' in nodes_ready.stdout"
      retries: 10
      delay: 5


    - name: "Fetch kubeconfig from VPS"
      # We need become because /etc/rancher/k3s/k3s.yaml is root-owned
      become: yes
      ansible.builtin.fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "{{ lookup('env', 'HOME') }}/.kube/config-hostinger"
        flat: yes

    - name: "Update Server IP to Tailscale IP in local config"
      delegate_to: localhost
      become: no
      ansible.builtin.replace:
        path: "{{ lookup('env', 'HOME') }}/.kube/config-hostinger"
        regexp: '127.0.0.1'
        replace: "{{ ts_ip }}"

    - name: "Ensure ~/.kube directory exists locally"
      delegate_to: localhost
      become: no
      ansible.builtin.file:
        path: "{{ lookup('env', 'HOME') }}/.kube"
        state: directory
        mode: '0700'
    
    - name: "Set KUBECONFIG Env Var in shell profile"
      delegate_to: localhost
      become: no
      ansible.builtin.lineinfile:
        path: "{{ lookup('env', 'HOME') }}/{{ '.zshrc' if lookup('env', 'SHELL') is search('zsh') else '.bashrc' }}"
        regexp: '^export KUBECONFIG='
        # This line includes both the default config and your new Hostinger config
        line: 'export KUBECONFIG=$HOME/.kube/config:$HOME/.kube/config-hostinger'
        state: present
        create: yes
        
    - name: "Configure Cluster to use Tailscale Proxy"
      delegate_to: localhost
      become: no
      # We use shell here because it's the easiest way to add a new key to the YAML
      shell: |
        kubectl config --kubeconfig={{ lookup('env', 'HOME') }}/.kube/config-hostinger \
        set-cluster default --proxy-url=socks5://127.0.0.1:1055

    - name: "Verify local access immediately"
      delegate_to: localhost
      shell: "KUBECONFIG={{ lookup('env', 'HOME') }}/.kube/config-hostinger kubectl get nodes"
      register: kube_test
      changed_when: false

    - name: "FINAL STEP: REFRESH YOUR TERMINAL"
      delegate_to: localhost
      debug:
        msg:
          - "###########################################################"
          - "SUCCESS! Your cluster is ready."
          - "You can now ssh to the server by opening another terminal"
          - "and using the command below"     
          - "tailscale ssh {{ ansible_user }}@{{ ansible_host }}" 
          - "###########################################################"